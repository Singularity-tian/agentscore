name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo build

      - name: Publish @llmagentscore/core
        run: |
          CURRENT=$(npm view @llmagentscore/core version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./packages/core/package.json').version")
          if [ "$CURRENT" != "$LOCAL" ]; then
            npm publish --workspace packages/core --provenance --access public
          else
            echo "Skipping @llmagentscore/core — $LOCAL already published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish agentscore (CLI)
        run: |
          CURRENT=$(npm view agentscore version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./packages/cli/package.json').version")
          if [ "$CURRENT" != "$LOCAL" ]; then
            npm publish --workspace packages/cli --provenance --access public
          else
            echo "Skipping agentscore — $LOCAL already published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @llmagentscore/sdk
        run: |
          CURRENT=$(npm view @llmagentscore/sdk version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./packages/sdk/package.json').version")
          if [ "$CURRENT" != "$LOCAL" ]; then
            npm publish --workspace packages/sdk --provenance --access public
          else
            echo "Skipping @llmagentscore/sdk — $LOCAL already published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @llmagentscore/agentscore-openclaw
        run: |
          CURRENT=$(npm view @llmagentscore/agentscore-openclaw version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./plugins/openclaw/package.json').version")
          if [ "$CURRENT" != "$LOCAL" ]; then
            npm publish --workspace plugins/openclaw --provenance --access public
          else
            echo "Skipping @llmagentscore/agentscore-openclaw — $LOCAL already published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
